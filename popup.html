<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anti Ultra</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <div class="noise"></div>
      <section class="card">
        <p class="eyebrow">Gemini cleaner</p>
        <h1>Anti Ultra</h1>
        <p class="summary">
          Strip the Google AI Ultra upsells out of Gemini and bring them back whenever you want.
        </p>

        <div class="status-row">
          <span class="status-label">Current mode</span>
          <span class="status-pill" id="status-pill">Hidden</span>
        </div>

        <button id="toggle-button" class="toggle-button" type="button">Show</button>

        <a
          class="donate-button"
          href="https://buymeacoffee.com/azizln"
          target="_blank"
          rel="noreferrer noopener"
        >
          Support the project
        </a>
      </section>
    </main>

    <script src="browser-api.js"></script>
    <script src="popup.js"></script>
  </body>
  </html>
